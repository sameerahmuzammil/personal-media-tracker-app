<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>My Personal Media Tracker</title>
    </head>
    <body>
        <h1 class="p-6 text-xl"><strong>My Personal Media Tracker</strong></h1>
        <div>
            <h3 id="form-title" class="p-2 px-6 text-base"><strong>New Item Details</strong></h3>
            <form class="bg-white gap-6 p-2 rounded-xl border border-gray-100" action="/media/" method="post">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 p-4">
                    <div class="flex flex-col gap-1">
                        <label>Category</label>
                        <select id="form-category" name="media_category" required class="gap-4 bg-white p-2 rounded-xl border border-gray-100">
                            <option>Movie</option>
                            <option>TV Show</option>
                            <option>Book</option>
                            <option>Anime</option>
                        </select>
                        <label>Author (if applicable)</label>
                        <input id="form-author" disabled type="text" name="author" placeholder="N/A" class="gap-4 bg-white p-2 rounded-xl border border-gray-100 cursor-not-allowed">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label>Media Name</label>
                        <input type="text" name="media_name" required class="gap-4 bg-white p-2 rounded-xl border border-gray-100">
                        <label>Genre</label>
                        <input type="text" name="genre" required class="gap-4 bg-white p-2 rounded-xl border border-gray-100">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label>Status</label>
                        <select name="status" required class="gap-4 bg-white p-2 rounded-xl border border-gray-100">
                            <option>Plan To Watch</option>
                            <option>Currently Watching</option>
                            <option>Watched</option>
                            <option>To Be Read</option>
                            <option>Currently Reading</option>
                            <option>Finished</option>
                            <option>Did Not Finish</option>
                        </select>
                        <label>Stars</label>
                        <select name="stars" class="gap-4 bg-white p-2 rounded-xl border border-gray-100">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-center items-center h-15">
                    <button id="form-submit-btn" class="bg-blue-500 text-white px-4 py-2 rounded" type="submit">Add Media Item</button>
                </div>
            </form>
        </div>
        <div class="flex justify-between items-center px-6 py-6">
            <h3 class="text-base"><strong>Media Items List</strong></h3>
            <button class="bg-red-600 text-white text-xs px-4 py-2 rounded-lg font-bold hover:bg-red-700 cursor-pointer" onclick="deleteAllItems()">
                Delete All Items
            </button>
        </div>
        <ul id="media-list" class="px-6 flex flex-col gap-4"></ul>
        <div class="m-6 p-6 bg-blue-50 rounded-xl border border-blue-100">
            <h3 class="text-base font-bold text-blue-900 mb-2">Item Detailed Inspection</h3>
            <div id="media-details" class="text-sm text-gray-700 italic">
                Click any item from the list above to view its complete records here...
            </div>
        </div>
        <script>
            let editingItemId = null;
            window.addEventListener('DOMContentLoaded', function() {
                loadMedia();

                const categorySelect = document.getElementById('form-category');
                const authorInput = document.getElementById('form-author');

                if (categorySelect && authorInput) {
                    categorySelect.addEventListener('change', function() {
                        if (categorySelect.value === 'Book') {
                            authorInput.disabled = false;
                            authorInput.required = true;
                            authorInput.placeholder = "Enter Author Name";
                            authorInput.className = "gap-4 bg-white p-2 rounded-xl border border-gray-100";
                        } else {
                            authorInput.value = ""; 
                            authorInput.disabled = true;
                            authorInput.required = false;
                            authorInput.placeholder = "N/A";
                            authorInput.className = "gap-4 bg-gray-100 p-2 rounded-xl border border-gray-100 cursor-not-allowed";
                        }
                    });
                }
            });
            function loadMedia() {
                fetch('/media/')
                    .then(response => response.json())
                    .then(mediaArray => {
                        const container = document.getElementById('media-list');
                        container.innerHTML = '';

                        mediaArray.forEach(item => {
                            const li = document.createElement('li');
                            li.className = "flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100";

                            li.innerHTML = `
                            <div onclick="viewItemDetails(${item.media_id})" class="cursor-pointer hover:bg-gray-100 p-1 rounded-lg w-full">
                                <span class="font-bold bg-white px-1 rounded border border-gray-200 cursor-text" id="name-${item.media_id}" onclick="event.stopPropagation()">
                                    ${item.media_name}
                                </span> 
                                <span class="text-sm text-gray-500">(${item.media_category})</span>
                                <p class="text-xs text-gray-400">Genre: ${item.genre} | Status: ${item.status}</p>
                            </div>
                            <div class="flex gap-2">
                                <button class="bg-green-600 text-white text-xs px-3 py-1 rounded-lg cursor-pointer" onclick="updateItem(${item.media_id})">
                                    Edit
                                </button>
                                <button class="bg-red-500 text-white text-xs px-3 py-1 rounded-lg cursor-pointer" onclick="deleteItem(${item.media_id})">
                                    Delete
                                </button>
                            </div>
                            `;

                            container.appendChild(li);
                        });
                    });
                }
            document.querySelector('form').addEventListener('submit', function(event) {
                event.preventDefault();
                
                const formData = new FormData(event.target);
                const data = Object.fromEntries(formData.entries());
                data.stars = Number(data.stars);
                
                if (editingItemId !== null) {
                    // --- 1. EDIT/UPDATE MODE ROUTE ---
                    fetch('/media/' + editingItemId, {
                        method: 'PATCH', // Targets your FastAPI patch route
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    })
                    .then(() => {
                        editingItemId = null;
                        document.getElementById('form-title').innerHTML = '<strong>New Item Details</strong>';
                        document.getElementById('form-submit-btn').innerText = 'Add Media Item';
                        
                        const authorInput = document.getElementById('form-author');
                        authorInput.disabled = true;
                        authorInput.placeholder = "N/A";
                        authorInput.className = "gap-4 bg-gray-100 p-2 rounded-xl border border-gray-100 cursor-not-allowed";

                        event.target.reset();
                        loadMedia();
                    });
                } else {
                    fetch('/media/', {
                        method: 'POST', // Targets your FastAPI post route
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    })
                    .then(() => {
                        event.target.reset();
                        loadMedia();
                    });
                }
            });
            function deleteAllItems() {
                if(confirm("Delete ALL items? This cannot be undone.")) {
                    fetch('/media/', {
                        method: 'DELETE'
                })
                    .then(() => {
                        document.getElementById('media-details').innerHTML = 'Click any item from the list above to view its complete records here...';
                        loadMedia();
                    }); 
                } 
            }
            function deleteItem(id) {
                fetch('/media/' + id, {
                    method: 'DELETE'
                })
                .then(() => {
                    document.getElementById('media-details').innerHTML = 'Click any item from the list above to view its complete records here...';
                    loadMedia();
                });
            }
            function updateItem(id) {
                fetch('/media/' + id)
                    .then(response => response.json())
                    .then(item => {
                        editingItemId = id;

                        document.getElementById('form-title').innerHTML = '<strong>Update Item Details</strong>';
                        document.getElementById('form-submit-btn').innerText = 'Save Changes';

                        document.getElementById('form-category').value = item.media_category;
                        document.getElementById('form-author').value = item.author;
                        document.querySelector('input[name="media_name"]').value = item.media_name;
                        document.querySelector('input[name="genre"]').value = item.genre;
                        document.querySelector('select[name="status"]').value = item.status;
                        document.querySelector('select[name="stars"]').value = item.stars;

                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
            }
            function viewItemDetails(id) {
                fetch('/media/' + id)
                    .then(response => response.json())
                    .then(item => {
                        const detailsContainer = document.getElementById('media-details');
                        
                        detailsContainer.innerHTML = `
                            <div class="grid grid-cols-2 gap-4 not-italic">
                                <p><strong>Database ID:</strong> ${item.media_id}</p>
                                <p><strong>Media Name:</strong> ${item.media_name}</p>
                                <p><strong>Category:</strong> ${item.media_category}</p>
                                <p><strong>Genre:</strong> ${item.genre}</p>
                                <p><strong>Author/Creator:</strong> ${item.author}</p>
                                <p><strong>Current Status:</strong> ${item.status}</p>
                                <p><strong>Rating Score:</strong> ${'⭐'.repeat(item.stars)} (${item.stars}/5)</p>
                            </div>
                        `;
                    });
            }
        </script>
    </body>
</html>
